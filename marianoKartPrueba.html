<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mario Kart - ML5 Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    #game-wrapper {
      position: relative;
    }
    canvas {
      display: block;
      border: 3px solid #ff6b00;
      box-shadow: 0 0 40px #ff6b0066, 0 0 80px #ff6b0022;
    }
    #hud-label {
      color: #ff6b00;
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.7;
    }
  </style>
</head>
<body>
<div id="game-wrapper">
  <div id="hud-label">← → Girar &nbsp;|&nbsp; ↑ Acelerar &nbsp;|&nbsp; ↓ Frenar &nbsp;|&nbsp; [Clase 1 - Teclado]</div>
</div>

<script>
// ─────────────────────────────────────────────
//  MARIO KART - CLASE 1
//  Base del juego con P5.js
//  Control: teclado (luego lo reemplazamos con ML5)
// ─────────────────────────────────────────────

const W = 800;
const H = 600;

// ── Pista: puntos de control que forman un loop ──
// Cada punto define el CENTRO de la pista
const TRACK_POINTS = [
  { x: 400, y: 80  },
  { x: 680, y: 100 },
  { x: 730, y: 200 },
  { x: 720, y: 380 },
  { x: 600, y: 490 },
  { x: 400, y: 520 },
  { x: 200, y: 490 },
  { x: 80,  y: 380 },
  { x: 70,  y: 200 },
  { x: 120, y: 100 },
];
const TRACK_WIDTH = 90; // ancho de la pista en px

// ── Kart ──
let kart = {
  x: 400,
  y: 130,
  angle: 0,        // ángulo en radianes (0 = mirando a la derecha)
  speed: 0,
  maxSpeed: 5,
  acceleration: 0.15,
  friction: 0.96,
  turnSpeed: 0.045,
  width: 28,
  height: 18,
  onTrack: true,
  // para el efecto visual del volante
  wheelAngle: 0,
};

// ── Partículas de polvo ──
let particles = [];

// ── Laps ──
let lapCount = 0;
let lastCheckpoint = false; // si pasó por la línea de meta recientemente

new p5(function(p) {

  // ── PRELOAD ──
  p.preload = function() {};

  // ── SETUP ──
  p.setup = function() {
    let canvas = p.createCanvas(W, H);
    canvas.parent('game-wrapper');
    p.angleMode(p.RADIANS);
    p.rectMode(p.CENTER);
    p.ellipseMode(p.CENTER);
  };

  // ── DRAW (loop principal) ──
  p.draw = function() {
    // Fondo
    drawBackground(p);

    // Pista
    drawTrack(p);

    // Línea de meta
    drawFinishLine(p);

    // Partículas
    updateAndDrawParticles(p);

    // Kart
    updateKart(p);
    drawKart(p);

    // HUD
    drawHUD(p);
  };

  // ────────────────────────────────────────────
  //  FONDO
  // ────────────────────────────────────────────
  function drawBackground(p) {
    // Cielo degradado
    for (let y = 0; y < H; y++) {
      let t = y / H;
      let r = p.lerp(20, 10, t);
      let g = p.lerp(30, 15, t);
      let b = p.lerp(60, 20, t);
      p.stroke(r, g, b);
      p.line(0, y, W, y);
    }

    // Estrellas (posición fija con seed)
    p.noStroke();
    p.randomSeed(42);
    for (let i = 0; i < 80; i++) {
      let sx = p.random(W);
      let sy = p.random(H * 0.6);
      let brightness = p.random(150, 255);
      let sz = p.random(1, 2.5);
      // parpadeo suave
      let twinkle = p.map(p.sin(p.frameCount * 0.05 + i), -1, 1, 0.5, 1);
      p.fill(brightness, brightness, brightness, brightness * twinkle);
      p.ellipse(sx, sy, sz, sz);
    }

    // Montañas de fondo (simple)
    drawMountains(p);

    // Suelo base (verde oscuro)
    p.noStroke();
    p.fill(30, 80, 30);
    p.rect(W / 2, H, W, H * 0.7); // parte baja
  }

  function drawMountains(p) {
    p.noStroke();
    // montaña trasera
    p.fill(40, 55, 80);
    drawMountain(p, 150, 300, 220);
    drawMountain(p, 400, 280, 180);
    drawMountain(p, 650, 310, 200);
    // montaña delantera
    p.fill(30, 45, 60);
    drawMountain(p, 250, 330, 160);
    drawMountain(p, 520, 320, 140);
  }

  function drawMountain(p, x, baseY, size) {
    p.triangle(x, baseY, x - size, baseY + size * 0.6, x + size, baseY + size * 0.6);
    // nieve
    p.fill(200, 220, 255, 180);
    p.triangle(x, baseY, x - size * 0.3, baseY + size * 0.2, x + size * 0.3, baseY + size * 0.2);
    p.fill(30, 45, 60); // restaurar
  }

  // ────────────────────────────────────────────
  //  PISTA
  // ────────────────────────────────────────────
  function drawTrack(p) {
    // Sombra exterior de la pista
    p.noFill();
    p.strokeWeight(TRACK_WIDTH + 20);
    p.stroke(0, 0, 0, 80);
    drawTrackPath(p);

    // Asfalto principal
    p.strokeWeight(TRACK_WIDTH);
    p.stroke(50, 50, 55);
    drawTrackPath(p);

    // Líneas blancas laterales
    p.strokeWeight(4);
    p.stroke(220, 220, 220, 200);
    drawTrackPathOffset(p, TRACK_WIDTH / 2 - 4);

    // Línea punteada central (amarilla)
    drawDashedCenter(p);

    // Hierba interior (rellenar el interior de la pista - visual)
    drawInnerGrass(p);
  }

  function drawTrackPath(p) {
    p.beginShape();
    p.noFill();
    for (let i = 0; i <= TRACK_POINTS.length; i++) {
      let pt = TRACK_POINTS[i % TRACK_POINTS.length];
      p.curveVertex(pt.x, pt.y);
      if (i === 0) p.curveVertex(pt.x, pt.y); // duplicar primero para curveVertex
    }
    let last = TRACK_POINTS[TRACK_POINTS.length - 1];
    p.curveVertex(last.x, last.y);
    p.endShape();
  }

  function drawTrackPathOffset(p, offset) {
    // Dibuja el contorno exterior e interior de la pista como líneas blancas
    // Simplificado: mismo path con grosor diferente
    p.strokeWeight(2);
    p.stroke(255, 255, 255, 180);
    p.noFill();
    // exterior
    drawTrackStrokeWidth(p, TRACK_WIDTH + 2);
    // interior
    drawTrackStrokeWidth(p, TRACK_WIDTH - 4);
  }

  function drawTrackStrokeWidth(p, w) {
    // No hacemos nada aquí para no complicar — las líneas blancas las
    // haremos con los bordes del stroke principal
  }

  function drawDashedCenter(p) {
    p.stroke(255, 220, 0, 180);
    p.strokeWeight(2);
    // Interpolamos puntos a lo largo de la pista y dibujamos segmentos
    let pts = getTrackPoints(60);
    for (let i = 0; i < pts.length; i += 2) {
      let a = pts[i];
      let b = pts[(i + 1) % pts.length];
      p.line(a.x, a.y, b.x, b.y);
    }
  }

  function drawInnerGrass(p) {
    // Círculo verde en el interior de la pista (aproximado)
    p.noStroke();
    p.fill(35, 100, 35);
    p.ellipse(395, 310, 440, 340);
    // Textura de hierba (pequeños puntos)
    p.fill(45, 120, 45);
    p.randomSeed(99);
    for (let i = 0; i < 60; i++) {
      let gx = p.random(195, 595);
      let gy = p.random(140, 470);
      p.ellipse(gx, gy, p.random(3, 8), p.random(3, 8));
    }
  }

  // ────────────────────────────────────────────
  //  LÍNEA DE META
  // ────────────────────────────────────────────
  function drawFinishLine(p) {
    let start = TRACK_POINTS[0];
    // Dibujamos la línea de meta horizontal en el primer punto
    let size = TRACK_WIDTH / 2;
    let cols = 6;
    let cellW = (size * 2) / cols;
    let cellH = 10;
    let rows = 3;

    p.push();
    p.translate(start.x, start.y);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        p.noStroke();
        p.fill((r + c) % 2 === 0 ? 255 : 0);
        p.rect(-size + c * cellW + cellW / 2, -rows * cellH / 2 + r * cellH + cellH / 2, cellW, cellH);
      }
    }
    p.pop();
  }

  // ────────────────────────────────────────────
  //  KART - UPDATE
  // ────────────────────────────────────────────
  function updateKart(p) {
    // ── Input ──
    // (aquí luego reemplazaremos con ML5)
    let accelerating = p.keyIsDown(p.UP_ARROW) || p.keyIsDown(87); // W
    let braking      = p.keyIsDown(p.DOWN_ARROW) || p.keyIsDown(83);
    let turningLeft  = p.keyIsDown(p.LEFT_ARROW) || p.keyIsDown(65);
    let turningRight = p.keyIsDown(p.RIGHT_ARROW) || p.keyIsDown(68);

    // ── Física ──
    if (accelerating) {
      kart.speed += kart.acceleration * (kart.onTrack ? 1 : 0.5);
    }
    if (braking) {
      kart.speed -= kart.acceleration * 1.5;
    }

    // Fricción
    kart.speed *= kart.friction;
    if (!kart.onTrack) kart.speed *= 0.97; // más lento fuera de pista

    // Limitar velocidad
    kart.speed = p.constrain(kart.speed, -kart.maxSpeed * 0.4, kart.maxSpeed);

    // Giro (sólo si hay velocidad)
    if (Math.abs(kart.speed) > 0.1) {
      let turnAmount = kart.turnSpeed * (kart.speed / kart.maxSpeed);
      if (turningLeft)  {
        kart.angle -= turnAmount;
        kart.wheelAngle = p.lerp(kart.wheelAngle, -0.4, 0.1);
      }
      else if (turningRight) {
        kart.angle += turnAmount;
        kart.wheelAngle = p.lerp(kart.wheelAngle, 0.4, 0.1);
      }
      else {
        kart.wheelAngle = p.lerp(kart.wheelAngle, 0, 0.15);
      }
    }

    // Mover
    kart.x += Math.cos(kart.angle) * kart.speed;
    kart.y += Math.sin(kart.angle) * kart.speed;

    // Límites del canvas
    kart.x = p.constrain(kart.x, 0, W);
    kart.y = p.constrain(kart.y, 0, H);

    // ── Detectar si está en pista ──
    kart.onTrack = isOnTrack(kart.x, kart.y);

    // ── Partículas de polvo ──
    if (Math.abs(kart.speed) > 0.5) {
      let freq = kart.onTrack ? 3 : 1; // más polvo fuera de pista
      if (p.frameCount % freq === 0) {
        spawnParticle(p, kart.x, kart.y);
      }
    }

    // ── Detectar vuelta completa ──
    let start = TRACK_POINTS[0];
    let dist = p.dist(kart.x, kart.y, start.x, start.y);
    if (dist < TRACK_WIDTH / 2) {
      if (!lastCheckpoint) {
        lapCount++;
        lastCheckpoint = true;
      }
    } else if (dist > TRACK_WIDTH) {
      lastCheckpoint = false;
    }
  }

  // ────────────────────────────────────────────
  //  KART - DIBUJO
  // ────────────────────────────────────────────
  function drawKart(p) {
    p.push();
    p.translate(kart.x, kart.y);
    p.rotate(kart.angle);

    let W2 = kart.width;
    let H2 = kart.height;

    // Sombra del kart
    p.noStroke();
    p.fill(0, 0, 0, 60);
    p.ellipse(3, 5, W2 + 8, H2 + 4);

    // Cuerpo principal del kart
    // Carrocería
    p.fill(220, 30, 30); // rojo Mario
    p.stroke(180, 10, 10);
    p.strokeWeight(1.5);
    p.rect(0, 0, W2, H2, 5);

    // Cabina (parte de arriba, más oscura)
    p.fill(180, 20, 20);
    p.noStroke();
    p.rect(0, -2, W2 * 0.55, H2 * 0.65, 4);

    // Parabrisas (celeste)
    p.fill(150, 210, 255, 200);
    p.rect(2, -2, W2 * 0.35, H2 * 0.4, 2);

    // Ruedas
    drawWheel(p, -W2 * 0.38,  H2 * 0.45, false);  // delantera izq
    drawWheel(p,  W2 * 0.38,  H2 * 0.45, false);  // delantera der
    drawWheel(p, -W2 * 0.38, -H2 * 0.45, false);  // trasera izq
    drawWheel(p,  W2 * 0.38, -H2 * 0.45, false);  // trasera der

    // Número del kart
    p.fill(255);
    p.noStroke();
    p.textSize(8);
    p.textAlign(p.CENTER, p.CENTER);
    p.text('1', 0, -1);

    p.pop();

    // Indicador de velocidad (flecha de dirección)
    if (kart.speed > 0.3) {
      p.push();
      p.translate(kart.x, kart.y);
      p.rotate(kart.angle);
      p.stroke(255, 255, 0, 120);
      p.strokeWeight(2);
      p.noFill();
      p.line(W2 * 0.6, 0, W2 * 0.6 + kart.speed * 4, 0);
      p.pop();
    }
  }

  function drawWheel(p, wx, wy, isFront) {
    p.push();
    p.translate(wx, wy);
    if (isFront) p.rotate(kart.wheelAngle);
    p.fill(30, 30, 30);
    p.noStroke();
    p.rect(0, 0, 9, 6, 2);
    p.fill(80, 80, 80);
    p.ellipse(0, 0, 5, 5);
    p.pop();
  }

  // ────────────────────────────────────────────
  //  PARTÍCULAS
  // ────────────────────────────────────────────
  function spawnParticle(p, x, y) {
    let angle = kart.angle + p.PI + p.random(-0.4, 0.4);
    let speed = p.random(0.5, 2);
    let col = kart.onTrack
      ? p.color(180, 180, 180, 180)   // polvo gris en pista
      : p.color(100, 180, 80, 200);   // hierba verde fuera

    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      size: p.random(4, 10),
      col,
    });
  }

  function updateAndDrawParticles(p) {
    for (let i = particles.length - 1; i >= 0; i--) {
      let pt = particles[i];
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.vx *= 0.95;
      pt.vy *= 0.95;
      pt.life -= 0.03;
      pt.size *= 0.97;

      if (pt.life <= 0) {
        particles.splice(i, 1);
        continue;
      }

      let c = pt.col;
      p.noStroke();
      p.fill(p.red(c), p.green(c), p.blue(c), p.alpha(c) * pt.life);
      p.ellipse(pt.x, pt.y, pt.size, pt.size);
    }
  }

  // ────────────────────────────────────────────
  //  HUD
  // ────────────────────────────────────────────
  function drawHUD(p) {
    // Panel velocímetro
    p.push();
    p.noStroke();

    // Fondo HUD
    p.fill(0, 0, 0, 150);
    p.rect(W - 100, H - 60, 110, 55, 8);

    // Texto velocidad
    let speed = Math.abs(kart.speed);
    let displaySpeed = Math.floor(speed * 40); // simular km/h

    p.fill(255, 200, 0);
    p.textSize(28);
    p.textAlign(p.RIGHT, p.CENTER);
    p.text(displaySpeed, W - 35, H - 48);

    p.fill(180, 180, 180);
    p.textSize(9);
    p.textAlign(p.RIGHT);
    p.text('km/h', W - 12, H - 35);

    // Vueltas
    p.textSize(11);
    p.fill(255);
    p.textAlign(p.LEFT);
    p.text('LAP  ' + lapCount, W - 105, H - 20);

    // Indicador fuera de pista
    if (!kart.onTrack) {
      p.fill(255, 80, 0, 220);
      p.textSize(13);
      p.textAlign(p.CENTER);
      p.text('⚠ FUERA DE PISTA', W / 2, 30);
    }

    p.pop();

    // Mini barra de velocidad
    p.noStroke();
    p.fill(30, 30, 30, 180);
    p.rect(15, H - 30, 120, 14, 4);
    let barW = p.map(speed, 0, kart.maxSpeed, 0, 116);
    let barCol = speed > kart.maxSpeed * 0.7 ? p.color(255, 80, 0) : p.color(80, 200, 80);
    p.fill(barCol);
    p.rect(15 + barW / 2 - 58 + 2, H - 30, barW, 10, 3);
    p.fill(200);
    p.textSize(8);
    p.textAlign(p.LEFT);
    p.text('VEL', 20, H - 25);
  }

  // ────────────────────────────────────────────
  //  UTILIDADES DE PISTA
  // ────────────────────────────────────────────

  // Devuelve puntos interpolados a lo largo de la pista
  function getTrackPoints(count) {
    let pts = [];
    for (let i = 0; i < count; i++) {
      let t = i / count;
      let pt = getTrackPoint(t);
      pts.push(pt);
    }
    return pts;
  }

  // Interpolación catmull-rom sobre los TRACK_POINTS
  function getTrackPoint(t) {
    let n = TRACK_POINTS.length;
    let scaledT = t * n;
    let i = Math.floor(scaledT);
    let frac = scaledT - i;

    let p0 = TRACK_POINTS[(i - 1 + n) % n];
    let p1 = TRACK_POINTS[i % n];
    let p2 = TRACK_POINTS[(i + 1) % n];
    let p3 = TRACK_POINTS[(i + 2) % n];

    return {
      x: catmullRom(p0.x, p1.x, p2.x, p3.x, frac),
      y: catmullRom(p0.y, p1.y, p2.y, p3.y, frac),
    };
  }

  function catmullRom(p0, p1, p2, p3, t) {
    return 0.5 * (
      (2 * p1) +
      (-p0 + p2) * t +
      (2*p0 - 5*p1 + 4*p2 - p3) * t*t +
      (-p0 + 3*p1 - 3*p2 + p3) * t*t*t
    );
  }

  // Chequea si (x, y) está sobre la pista
  function isOnTrack(x, y) {
    let pts = getTrackPoints(80);
    let minDist = Infinity;
    for (let pt of pts) {
      let d = Math.sqrt((x - pt.x)**2 + (y - pt.y)**2);
      if (d < minDist) minDist = d;
    }
    return minDist < TRACK_WIDTH / 2;
  }

}); // fin new p5
</script>
</body>
</html>
