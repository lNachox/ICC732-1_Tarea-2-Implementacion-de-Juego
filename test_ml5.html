<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test ML5</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@latest/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ml5@latest/dist/ml5.min.js"></script>
</head>
<body>
<h2 id="status" style="font-family:monospace; padding:20px;">Cargando...</h2>
<h2 id="label"  style="font-family:monospace; padding:20px; color:green;">—</h2>

<script>
const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/ZpKc-4XCi/';
let classifier;
let video;

// 1. Imprimir qué métodos tiene ml5 disponibles
console.log('ml5 version:', ml5.version);
console.log('ml5 keys:', Object.keys(ml5));

async function init() {
  document.getElementById('status').innerText = 'Creando clasificador...';

  // En ml5 v1.x imageClassifier devuelve una promesa
  classifier = await ml5.imageClassifier(MODEL_URL + 'model.json');

  console.log('classifier creado:', classifier);
  console.log('classifier keys:', Object.keys(classifier));

  document.getElementById('status').innerText = 'Modelo listo. Iniciando cámara...';

  // Crear video con p5
  let p = new p5(function(sketch) {
    sketch.setup = function() {
      sketch.noCanvas();
      video = sketch.createCapture(sketch.VIDEO);
      video.size(320, 240);

      video.elt.addEventListener('loadeddata', async () => {
        document.getElementById('status').innerText = 'Camara lista. Clasificando...';
        classifyLoop();
      });
    };
  });
}

async function classifyLoop() {
  try {
    // Intentar con await (promesa)
    let results = await classifier.classify(video.elt);
    document.getElementById('label').innerText = results[0].label + ' (' + (results[0].confidence * 100).toFixed(0) + '%)';
    classifyLoop();
  } catch(e) {
    console.error('Error classify:', e);
    document.getElementById('status').innerText = 'ERROR: ' + e.message;
  }
}

init();
</script>
</body>
</html>
