<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mario Kart - ML5 Edition</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@latest/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ml5@latest/dist/ml5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas { display: block; border: 3px solid #ff6b00; box-shadow: 0 0 40px #ff6b0066; }
    /* Canvas auxiliar oculto para capturar frames del video */
    #capture-canvas { display: none; }
    #hud-label {
      color: #ff6b00; font-size: 11px; text-align: center;
      margin-top: 8px; letter-spacing: 2px; opacity: 0.7;
    }
  </style>
</head>
<body>
<canvas id="capture-canvas" width="160" height="120"></canvas>
<div id="hud-label">Mano abierta = Izq &nbsp;|&nbsp; Puno = Der &nbsp;|&nbsp; Cruz = Frenar &nbsp;|&nbsp; Nada = Acelerar &nbsp;|&nbsp; Teclado: flechas</div>

<script>
const W = 800, H = 600;
const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/ZpKc-4XCi/';

// ── Estado global ──
let classifier;
let video;
let captureCanvas, captureCtx;
let currentLabel = "nada";
let confidence   = 0;
let modelReady   = false;
let gameStarted  = false;  // el juego espera hasta que todo esté listo

// ── Pista ──
const TRACK_CTRL = [
  {x:400,y:80}, {x:680,y:100}, {x:730,y:200}, {x:720,y:380},
  {x:600,y:490}, {x:400,y:520}, {x:200,y:490},
  {x:80,y:380}, {x:70,y:200}, {x:120,y:100},
];
const TRACK_WIDTH = 90;
let TRACK_PTS = [];

// ── Kart ──
let kart = {
  x:400, y:130, angle:0, speed:0,
  maxSpeed:5, acceleration:0.12, friction:0.96,
  turnSpeed:0.045, width:28, height:18, onTrack:true,
};
let particles = [];
let lapCount = 0, lastCheckpoint = false;

// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────
function setup() {
  createCanvas(W, H);
  angleMode(RADIANS);
  rectMode(CENTER);
  ellipseMode(CENTER);

  TRACK_PTS = buildTrackPoints(120);

  // Canvas auxiliar para capturar frames
  captureCanvas = document.getElementById('capture-canvas');
  captureCtx    = captureCanvas.getContext('2d');

  // Iniciar cámara y modelo en paralelo
  video = createCapture(VIDEO);
  video.size(160, 120);
  video.hide();

  // Cargar todo de forma asíncrona
  initML();
  captureLoop(); // arrancar captura continua
}

async function initML() {
  try {
    // 1. Cargar modelo
    classifier = await ml5.imageClassifier(MODEL_URL + 'model.json');
    console.log('✅ Modelo cargado');

    // 2. Esperar a que el video tenga datos
    await waitForVideo();
    console.log('✅ Cámara lista');

    // 3. Todo listo — arrancar juego y clasificación
    modelReady  = true;
    gameStarted = true;
    classifyLoop();

  } catch(e) {
    console.error('Error en initML:', e);
  }
}

function waitForVideo() {
  return new Promise((resolve) => {
    if (video.elt.readyState >= 2) {
      resolve();
    } else {
      video.elt.addEventListener('loadeddata', resolve, { once: true });
    }
  });
}

// Loop de captura — corre independiente, siempre actualizado
function captureLoop() {
  if (video.elt.readyState >= 2) {
    captureCtx.drawImage(video.elt, 0, 0, 160, 120);
  }
  requestAnimationFrame(captureLoop);
}

// Loop de clasificación — usa el canvas actualizado
async function classifyLoop() {
  while (modelReady) {
    try {
      // Crear un ImageData fresco desde el canvas en cada frame
      let imageData = captureCtx.getImageData(0, 0, 160, 120);
      let results = await classifier.classify(imageData);
      currentLabel = results[0].label.trim();
      confidence   = results[0].confidence;
      console.log(currentLabel, confidence);
    } catch(e) {
      console.error('classify error:', e);
    }
    await new Promise(r => setTimeout(r, 50));
  }
}

// ─────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────
function draw() {
  if (!gameStarted) {
    // Pantalla de carga mientras no está todo listo
    drawLoadingScreen();
    return;
  }
  drawBackground();
  drawTrack();
  drawFinishLine();
  updateAndDrawParticles();
  updateKart();
  drawKart();
  drawHUD();
  drawCameraFeed();
  drawGestureLabel();
}

function drawLoadingScreen() {
  background(10, 10, 20);
  fill(255, 107, 0);
  textSize(22); textAlign(CENTER, CENTER);
  text('Cargando modelo y camara...', W/2, H/2 - 20);
  fill(150);
  textSize(13);
  text('(puede tardar unos segundos)', W/2, H/2 + 20);

  // Animación simple de puntos
  fill(255, 107, 0);
  let dots = floor(frameCount / 20) % 4;
  text('.'.repeat(dots), W/2, H/2 + 50);
}

// ─────────────────────────────────────────────
//  KART UPDATE
// ─────────────────────────────────────────────
function updateKart() {
  let label = (confidence > 0.7) ? currentLabel : "Nada";

  let accelerating = (label === "Nada");
  let turningLeft  = (label === "Mizquierda");
  let turningRight = (label === "Mderecha");
  let braking      = (label === "frenar");

  // Teclado como respaldo
  if (keyIsDown(UP_ARROW)    || keyIsDown(87)) { accelerating = true; }
  if (keyIsDown(DOWN_ARROW)  || keyIsDown(83)) { braking = true; }
  if (keyIsDown(LEFT_ARROW)  || keyIsDown(65)) { turningLeft = true; accelerating = true; }
  if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) { turningRight = true; accelerating = true; }

  if (accelerating) kart.speed += kart.acceleration * (kart.onTrack ? 1 : 0.5);
  if (braking)      kart.speed -= kart.acceleration * 2;

  kart.speed *= kart.friction;
  if (!kart.onTrack) kart.speed *= 0.97;
  kart.speed = constrain(kart.speed, -kart.maxSpeed * 0.4, kart.maxSpeed);

  if (abs(kart.speed) > 0.1) {
    let turn = kart.turnSpeed * (kart.speed / kart.maxSpeed);
    if (turningLeft)       kart.angle -= turn;
    else if (turningRight) kart.angle += turn;
  }

  kart.x += cos(kart.angle) * kart.speed;
  kart.y += sin(kart.angle) * kart.speed;
  kart.x = constrain(kart.x, 0, W);
  kart.y = constrain(kart.y, 0, H);
  kart.onTrack = isOnTrack(kart.x, kart.y);

  if (abs(kart.speed) > 0.5 && frameCount % (kart.onTrack ? 3 : 1) === 0)
    spawnParticle(kart.x, kart.y);

  let s = TRACK_PTS[0];
  let d = dist(kart.x, kart.y, s.x, s.y);
  if (d < TRACK_WIDTH / 2) {
    if (!lastCheckpoint) { lapCount++; lastCheckpoint = true; }
  } else if (d > TRACK_WIDTH) {
    lastCheckpoint = false;
  }
}

// ─────────────────────────────────────────────
//  DIBUJOS
// ─────────────────────────────────────────────
function drawKart() {
  push();
  translate(kart.x, kart.y);
  rotate(kart.angle);
  let W2 = kart.width, H2 = kart.height;
  noStroke(); fill(0,0,0,60); ellipse(3,5,W2+8,H2+4);
  fill(220,30,30); stroke(180,10,10); strokeWeight(1.5); rect(0,0,W2,H2,5);
  fill(180,20,20); noStroke(); rect(0,-2,W2*0.55,H2*0.65,4);
  fill(150,210,255,200); rect(2,-2,W2*0.35,H2*0.4,2);
  drawWheel(-W2*0.38, H2*0.45); drawWheel(W2*0.38, H2*0.45);
  drawWheel(-W2*0.38,-H2*0.45); drawWheel(W2*0.38,-H2*0.45);
  fill(255); noStroke(); textSize(8); textAlign(CENTER,CENTER); text('1',0,-1);
  pop();
}

function drawWheel(wx, wy) {
  push(); translate(wx,wy);
  fill(30,30,30); noStroke(); rect(0,0,9,6,2);
  fill(80,80,80); ellipse(0,0,5,5);
  pop();
}

function drawCameraFeed() {
  let cx=10, cy=10, cw=160, ch=120;
  noStroke(); fill(0,0,0,180);
  rect(cx+cw/2, cy+ch/2+16, cw+8, ch+32, 6);
  push();
  translate(cx+cw, cy+22); scale(-1,1);
  image(video, 0, 0, cw, ch);
  pop();
  noFill(); stroke(255,107,0); strokeWeight(2);
  rect(cx+cw/2, cy+ch/2+22, cw, ch, 3);
  noStroke(); fill(255,107,0); textSize(9); textAlign(LEFT);
  text('CAM', cx+2, cy+14);
}

function drawGestureLabel() {
  let labelY=170, cx=90;
  let col, txt;
  switch(currentLabel) {
    case 'Mizquierda': col=color(80,200,255);  txt='< IZQUIERDA'; break;
    case 'Mderecha':   col=color(255,180,0);   txt='> DERECHA';   break;
    case 'frenar':    col=color(255,60,60);   txt='! FRENAR';    break;
    default:          col=color(100,255,100); txt='^ ACELERAR';  break;
  }
  noStroke(); fill(0,0,0,160); rect(cx,labelY,172,22,4);
  fill(col); textSize(11); textAlign(CENTER,CENTER); text(txt,cx,labelY);
  fill(30,30,30,180); rect(cx,labelY+16,172,8,3);
  let bw=map(confidence,0,1,0,168);
  fill(col); rect(cx-84+bw/2,labelY+16,bw,6,3);
  fill(200); textSize(8); textAlign(RIGHT);
  text(floor(confidence*100)+'%', cx+84, labelY+16);
}

function drawBackground() {
  for (let y=0; y<H; y++) {
    let t=y/H;
    stroke(lerp(20,10,t), lerp(30,15,t), lerp(60,20,t));
    line(0,y,W,y);
  }
  noStroke(); randomSeed(42);
  for (let i=0; i<80; i++) {
    let sx=random(W), sy=random(H*0.6), b=random(150,255), sz=random(1,2.5);
    let tw=map(sin(frameCount*0.05+i),-1,1,0.5,1);
    fill(b,b,b,b*tw); ellipse(sx,sy,sz,sz);
  }
  drawMountains();
  noStroke(); fill(30,80,30); rect(W/2,H,W,H*0.7);
}

function drawMountains() {
  noStroke(); fill(40,55,80);
  drawMountain(150,300,220); drawMountain(400,280,180); drawMountain(650,310,200);
  fill(30,45,60);
  drawMountain(250,330,160); drawMountain(520,320,140);
}

function drawMountain(x,baseY,size) {
  triangle(x,baseY, x-size,baseY+size*0.6, x+size,baseY+size*0.6);
  fill(200,220,255,180);
  triangle(x,baseY, x-size*0.3,baseY+size*0.2, x+size*0.3,baseY+size*0.2);
  fill(30,45,60);
}

function drawTrack() {
  noFill();
  stroke(0,0,0,80); strokeWeight(TRACK_WIDTH+20); drawTrackFromPoints();
  stroke(50,50,55); strokeWeight(TRACK_WIDTH);    drawTrackFromPoints();
  stroke(255,220,0,180); strokeWeight(2);
  for (let i=0; i<TRACK_PTS.length; i+=2) {
    let a=TRACK_PTS[i], b=TRACK_PTS[(i+1)%TRACK_PTS.length];
    line(a.x,a.y,b.x,b.y);
  }
  drawInnerGrass();
}

function drawTrackFromPoints() {
  beginShape(); noFill();
  for (let pt of TRACK_PTS) vertex(pt.x, pt.y);
  endShape(CLOSE);
}

function drawInnerGrass() {
  noStroke(); fill(35,100,35); ellipse(395,310,440,340);
  fill(45,120,45); randomSeed(99);
  for (let i=0; i<60; i++)
    ellipse(random(195,595),random(140,470),random(3,8),random(3,8));
}

function drawFinishLine() {
  let s=TRACK_PTS[0], size=TRACK_WIDTH/2;
  let cols=6, cellW=(size*2)/cols, cellH=10, rows=3;
  push(); translate(s.x,s.y);
  for (let r=0; r<rows; r++)
    for (let c=0; c<cols; c++) {
      noStroke(); fill((r+c)%2===0?255:0);
      rect(-size+c*cellW+cellW/2, -rows*cellH/2+r*cellH+cellH/2, cellW, cellH);
    }
  pop();
}

function drawHUD() {
  push(); noStroke(); fill(0,0,0,150); rect(W-100,H-60,110,55,8);
  let spd=abs(kart.speed);
  fill(255,200,0); textSize(28); textAlign(RIGHT,CENTER); text(floor(spd*40),W-35,H-48);
  fill(180,180,180); textSize(9); textAlign(RIGHT); text('km/h',W-12,H-35);
  textSize(11); fill(255); textAlign(LEFT); text('LAP  '+lapCount,W-105,H-20);
  if (!kart.onTrack) { fill(255,80,0,220); textSize(13); textAlign(CENTER); text('FUERA DE PISTA',W/2,30); }
  pop();
  noStroke(); fill(30,30,30,180); rect(15,H-30,120,14,4);
  let bw=map(abs(kart.speed),0,kart.maxSpeed,0,116);
  fill(abs(kart.speed)>kart.maxSpeed*0.7?color(255,80,0):color(80,200,80));
  rect(15+bw/2-58+2,H-30,bw,10,3);
  fill(200); textSize(8); textAlign(LEFT); text('VEL',20,H-25);
}

function spawnParticle(x,y) {
  let a=kart.angle+PI+random(-0.4,0.4), spd=random(0.5,2);
  let col=kart.onTrack?color(180,180,180,180):color(100,180,80,200);
  particles.push({x,y,vx:cos(a)*spd,vy:sin(a)*spd,life:1.0,size:random(4,10),col});
}

function updateAndDrawParticles() {
  for (let i=particles.length-1; i>=0; i--) {
    let pt=particles[i];
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vx*=0.95; pt.vy*=0.95;
    pt.life-=0.03; pt.size*=0.97;
    if (pt.life<=0) { particles.splice(i,1); continue; }
    noStroke(); fill(red(pt.col),green(pt.col),blue(pt.col),alpha(pt.col)*pt.life);
    ellipse(pt.x,pt.y,pt.size,pt.size);
  }
}

// ─────────────────────────────────────────────
//  UTILIDADES PISTA
// ─────────────────────────────────────────────
function buildTrackPoints(count) {
  let pts=[], n=TRACK_CTRL.length;
  for (let i=0; i<count; i++) {
    let t=i/count, st=t*n, idx=Math.floor(st), f=st-idx;
    let p0=TRACK_CTRL[(idx-1+n)%n], p1=TRACK_CTRL[idx%n];
    let p2=TRACK_CTRL[(idx+1)%n],   p3=TRACK_CTRL[(idx+2)%n];
    pts.push({x:catmullRom(p0.x,p1.x,p2.x,p3.x,f), y:catmullRom(p0.y,p1.y,p2.y,p3.y,f)});
  }
  return pts;
}

function catmullRom(p0,p1,p2,p3,t) {
  return 0.5*((2*p1)+(-p0+p2)*t+(2*p0-5*p1+4*p2-p3)*t*t+(-p0+3*p1-3*p2+p3)*t*t*t);
}

function isOnTrack(x,y) {
  let minDist=Infinity;
  for (let pt of TRACK_PTS) {
    let d=dist(x,y,pt.x,pt.y);
    if (d<minDist) minDist=d;
  }
  return minDist < TRACK_WIDTH/2;
}
</script>
</body>
</html>
