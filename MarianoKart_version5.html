<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mario Kart - ML5 Edition</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@latest/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ml5@latest/dist/ml5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; font-family: 'Courier New', monospace;
    }
    canvas { display: block; border: 3px solid #ff6b00; box-shadow: 0 0 40px #ff6b0066; }
    #capture-canvas { display: none; }
    #hud-label { color: #ff6b00; font-size: 11px; text-align: center; margin-top: 8px; letter-spacing: 2px; opacity: 0.7; }
  </style>
</head>
<body>
<canvas id="capture-canvas" width="160" height="120"></canvas>
<div id="hud-label">Mano abierta = Izq &nbsp;|&nbsp; Puno = Der &nbsp;|&nbsp; Cruz = Frenar</div>

<script>
const W = 800, H = 600;
const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/ZpKc-4XCi/';
const TOTAL_LAPS = 3; // número de vueltas para terminar la carrera

let classifier, video, captureCanvas, captureCtx;
let currentLabel = "Nada", confidence = 0;
let modelReady = false;
// Estados: 'loading' | 'countdown' | 'playing' | 'finished'
let gameState = 'loading';
let countdownValue = 3, countdownTimer = 0;

// ── Tiempo ──
let raceStartTime  = 0;   // millis() cuando arrancó la carrera
let lapStartTime   = 0;   // millis() cuando arrancó la vuelta actual
let lapTimes       = [];  // tiempos de cada vuelta completada
let bestLapTime    = Infinity;
let finalPosition  = 1;   // posición al terminar

// ── Pista ──
const TRACK_CTRL = [
  {x:400,y:120},{x:670,y:140},{x:720,y:240},{x:710,y:420},
  {x:580,y:510},{x:400,y:540},{x:220,y:510},
  {x:90,y:420},{x:80,y:240},{x:130,y:140},
];
const TRACK_WIDTH = 80;
let TRACK_PTS = [];

// ── Kart jugador ──
const START_X = 400, START_Y = 150, START_ANGLE = 0;
let kart = {
  x:START_X, y:START_Y, angle:START_ANGLE, speed:0,
  maxSpeed:5, acceleration:0.12, friction:0.96,
  turnSpeed:0.045, width:28, height:18, onTrack:true,
  trackIndex:0, lapCount:0, lastCheckpoint:false,
};

// ── Rivales ──
const RIVAL_DEFS = [
  { maxSpeed: 3.8, col: [30,  120, 255], num: '2' },
  { maxSpeed: 3.2, col: [80,  200,  60], num: '3' },
  { maxSpeed: 4.2, col: [220, 180,   0], num: '4' },
];
let rivals = [];
let particles = [];

// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────
function setup() {
  createCanvas(W, H);
  angleMode(RADIANS); rectMode(CENTER); ellipseMode(CENTER);
  textFont('monospace');
  TRACK_PTS = buildTrackPoints(120);
  initRivals();
  captureCanvas = document.getElementById('capture-canvas');
  captureCtx    = captureCanvas.getContext('2d');
  video = createCapture(VIDEO);
  video.size(160, 120); video.hide();
  initML();
}

function initRivals() {
  rivals = [];
  let n = TRACK_PTS.length;
  for (let i = 0; i < RIVAL_DEFS.length; i++) {
    let def = RIVAL_DEFS[i];
    let idx = ((0 - (i+1)*4) + n) % n;
    let pt  = TRACK_PTS[idx];
    let nextPt = TRACK_PTS[(idx+1)%n];
    rivals.push({
      x:pt.x, y:pt.y,
      angle:atan2(nextPt.y-pt.y, nextPt.x-pt.x),
      speed:0, maxSpeed:def.maxSpeed,
      targetIdx:(idx+1)%n,
      col:def.col, num:def.num,
      lapCount:0, trackIndex:idx,
      width:28, height:18,
      finished:false,
    });
  }
}

// ─────────────────────────────────────────────
//  ML5
// ─────────────────────────────────────────────
async function initML() {
  try {
    classifier = await ml5.imageClassifier(MODEL_URL + 'model.json');
    await waitForVideo();
    modelReady = true;
    captureLoop(); classifyLoop();
    startCountdown();
  } catch(e) { console.error('Error:', e); }
}

function waitForVideo() {
  return new Promise(resolve => {
    if (video.elt.readyState >= 2) resolve();
    else video.elt.addEventListener('loadeddata', resolve, { once: true });
  });
}

function captureLoop() {
  if (video.elt.readyState >= 2)
    captureCtx.drawImage(video.elt, 0, 0, 160, 120);
  requestAnimationFrame(captureLoop);
}

async function classifyLoop() {
  while (modelReady) {
    try {
      let imageData = captureCtx.getImageData(0, 0, 160, 120);
      let results   = await classifier.classify(imageData);
      currentLabel  = results[0].label.trim();
      confidence    = results[0].confidence;
    } catch(e) {}
    await new Promise(r => setTimeout(r, 50));
  }
}

// ─────────────────────────────────────────────
//  ESTADO / RESET
// ─────────────────────────────────────────────
function startCountdown() {
  gameState = 'countdown';
  countdownValue = 3;
  countdownTimer = millis();
  // Resetear tiempos
  raceStartTime = 0;
  lapStartTime  = 0;
  lapTimes      = [];
  bestLapTime   = Infinity;
}

function startRace() {
  gameState     = 'playing';
  raceStartTime = millis();
  lapStartTime  = millis();
}

function resetGame() {
  kart.x=START_X; kart.y=START_Y; kart.angle=START_ANGLE;
  kart.speed=0; kart.onTrack=true; kart.lapCount=0;
  kart.lastCheckpoint=false; kart.trackIndex=0;
  particles=[];
  initRivals();
  startCountdown();
}

// ─────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────
function draw() {
  if (gameState === 'loading') { drawLoadingScreen(); return; }

  drawBackground();
  drawTrack();
  drawFinishLine();
  updateAndDrawParticles();

  if (gameState === 'playing') {
    updateKart();
    updateRivals();
    checkCollisions();
  }

  for (let r of rivals) drawRival(r);
  drawKart();
  drawHUD();
  drawCameraFeed();
  drawGestureLabel();
  drawResetButton();

  if (gameState === 'countdown') {
    drawCountdown();
    let elapsed = millis() - countdownTimer;
    let newVal  = 3 - floor(elapsed / 1000);
    if (newVal <= 0) startRace();
    else countdownValue = newVal;
  }

  if (gameState === 'finished') {
    drawFinishScreen();
  }
}

// ─────────────────────────────────────────────
//  KART UPDATE
// ─────────────────────────────────────────────
function updateKart() {
  let label = (confidence > 0.7) ? currentLabel : "Nada";
  let turningLeft  = (label === "Mizquierda");
  let turningRight = (label === "Mderecha");
  let braking      = (label === "frenar");

  if (keyIsDown(DOWN_ARROW)  || keyIsDown(83)) braking     = true;
  if (keyIsDown(LEFT_ARROW)  || keyIsDown(65)) turningLeft  = true;
  if (keyIsDown(RIGHT_ARROW) || keyIsDown(68)) turningRight = true;

  if (!braking) kart.speed += kart.acceleration * (kart.onTrack ? 1 : 0.4);
  else          kart.speed -= kart.acceleration * 2.5;

  kart.speed *= kart.friction;
  if (!kart.onTrack) kart.speed *= 0.96;
  kart.speed = constrain(kart.speed, 0, kart.maxSpeed);

  if (kart.speed > 0.1) {
    let turn = kart.turnSpeed * (kart.speed / kart.maxSpeed);
    if (turningLeft)       kart.angle -= turn;
    else if (turningRight) kart.angle += turn;
  }

  kart.x += cos(kart.angle) * kart.speed;
  kart.y += sin(kart.angle) * kart.speed;
  kart.x = constrain(kart.x, 0, W);
  kart.y = constrain(kart.y, 0, H);
  kart.onTrack = isOnTrack(kart.x, kart.y);

  if (kart.speed > 0.5 && frameCount % (kart.onTrack ? 3 : 1) === 0)
    spawnParticle(kart.x, kart.y, kart.angle);

  kart.trackIndex = closestTrackIndex(kart.x, kart.y);

  // ── Detección de vuelta ──
  let s = TRACK_PTS[0];
  let d = dist(kart.x, kart.y, s.x, s.y);
  if (d < TRACK_WIDTH / 2 && kart.speed > 0.5) {
    if (!kart.lastCheckpoint) {
      kart.lapCount++;
      kart.lastCheckpoint = true;

      // Registrar tiempo de vuelta
      let lapTime = millis() - lapStartTime;
      lapTimes.push(lapTime);
      if (lapTime < bestLapTime) bestLapTime = lapTime;
      lapStartTime = millis();

      // Verificar si terminó la carrera
      if (kart.lapCount >= TOTAL_LAPS) {
        finalPosition = getRacePosition();
        gameState = 'finished';
      }
    }
  } else if (d > TRACK_WIDTH) {
    kart.lastCheckpoint = false;
  }
}

// ─────────────────────────────────────────────
//  RIVALES UPDATE
// ─────────────────────────────────────────────
function updateRivals() {
  for (let r of rivals) {
    if (r.finished) continue;

    let target = TRACK_PTS[r.targetIdx];
    let dx = target.x - r.x, dy = target.y - r.y;
    let distToTarget = sqrt(dx*dx + dy*dy);

    let desiredAngle = atan2(dy, dx);
    let angleDiff = desiredAngle - r.angle;
    while (angleDiff >  PI) angleDiff -= TWO_PI;
    while (angleDiff < -PI) angleDiff += TWO_PI;
    r.angle += angleDiff * 0.12;

    r.speed += 0.08;
    r.speed *= 0.95;
    r.speed = constrain(r.speed, 0, r.maxSpeed);

    r.x += cos(r.angle) * r.speed;
    r.y += sin(r.angle) * r.speed;

    if (distToTarget < 8) {
      r.targetIdx = (r.targetIdx + 1) % TRACK_PTS.length;
      if (r.targetIdx === 1) {
        r.lapCount++;
        if (r.lapCount >= TOTAL_LAPS) r.finished = true;
      }
    }
    r.trackIndex = r.targetIdx;
  }
}

// ─────────────────────────────────────────────
//  COLISIONES
// ─────────────────────────────────────────────
function checkCollisions() {
  for (let r of rivals) {
    let d = dist(kart.x, kart.y, r.x, r.y);
    if (d < 24) {
      kart.speed *= 0.4;
      let pushAngle = atan2(kart.y - r.y, kart.x - r.x);
      kart.x += cos(pushAngle) * 6;
      kart.y += sin(pushAngle) * 6;
      r.speed *= 0.7;
    }
  }
}

// ─────────────────────────────────────────────
//  POSICIÓN EN CARRERA
// ─────────────────────────────────────────────
function getRacePosition() {
  let total = TRACK_PTS.length;
  let allRacers = [
    { name:'TU', progress: kart.lapCount * total + kart.trackIndex },
    ...rivals.map(r => ({ name:r.num, progress: r.lapCount * total + r.trackIndex }))
  ];
  allRacers.sort((a,b) => b.progress - a.progress);
  return allRacers.findIndex(r => r.name === 'TU') + 1;
}

// ── Formato mm:ss.ms ──
function formatTime(ms) {
  if (ms === Infinity || ms === 0) return '--:--.---';
  let minutes = floor(ms / 60000);
  let seconds = floor((ms % 60000) / 1000);
  let milsecs = floor(ms % 1000);
  return nf(minutes,1) + ':' + nf(seconds,2) + '.' + nf(milsecs,3);
}

// ─────────────────────────────────────────────
//  PANTALLA DE FIN DE CARRERA
// ─────────────────────────────────────────────
function drawFinishScreen() {
  // Overlay oscuro
  noStroke(); fill(0,0,0,200);
  rect(W/2, H/2, W, H);

  let pos = finalPosition;
  let medals = ['🏆','🥈','🥉','💀'];
  let medal  = medals[min(pos-1, 3)];
  let posStr = pos + ['ST','ND','RD','TH'][min(pos-1,3)];
  let posColors = [
    color(255,220,0),   // 1st - oro
    color(200,200,200), // 2nd - plata
    color(200,120,60),  // 3rd - bronce
    color(180,60,60),   // 4th - rojo
  ];
  let posCol = posColors[min(pos-1,3)];

  // Panel central
  fill(20,20,30,240); stroke(255,107,0); strokeWeight(2);
  rect(W/2, H/2, 420, 340, 12);

  // Título
  fill(255,107,0); noStroke(); textSize(16); textAlign(CENTER,CENTER);
  text('CARRERA TERMINADA', W/2, H/2 - 140);

  // Posición grande
  fill(posCol); textSize(70); textAlign(CENTER,CENTER);
  text(posStr, W/2 - 40, H/2 - 70);
  textSize(50);
  text(medal, W/2 + 70, H/2 - 70);

  // Mensaje según posición
  let msg = ['¡GANASTE!', 'Buen resultado', 'Casi...', '¡Sigue practicando!'][min(pos-1,3)];
  fill(255); textSize(16); text(msg, W/2, H/2 - 10);

  // Línea separadora
  stroke(255,107,0,100); strokeWeight(1);
  line(W/2 - 180, H/2 + 15, W/2 + 180, H/2 + 15);

  // Tiempo total de carrera
  let totalTime = lapTimes.reduce((a,b) => a+b, 0);
  noStroke(); fill(180,180,180); textSize(11); textAlign(LEFT,CENTER);
  text('TIEMPO TOTAL', W/2 - 180, H/2 + 40);
  fill(255); textSize(14); textAlign(RIGHT,CENTER);
  text(formatTime(totalTime), W/2 + 180, H/2 + 40);

  // Mejor vuelta
  fill(180,180,180); textSize(11); textAlign(LEFT,CENTER);
  text('MEJOR VUELTA', W/2 - 180, H/2 + 68);
  fill(100,255,150); textSize(14); textAlign(RIGHT,CENTER);
  text(formatTime(bestLapTime), W/2 + 180, H/2 + 68);

  // Tiempos de cada vuelta
  for (let i=0; i<lapTimes.length; i++) {
    let isBest = lapTimes[i] === bestLapTime;
    fill(isBest ? color(100,255,150) : color(200,200,200));
    textSize(11); textAlign(LEFT,CENTER);
    text('VUELTA ' + (i+1), W/2 - 180, H/2 + 96 + i*22);
    textAlign(RIGHT,CENTER);
    text(formatTime(lapTimes[i]) + (isBest ? ' ★' : ''), W/2 + 180, H/2 + 96 + i*22);
  }

  // Botón jugar de nuevo
  let bx=W/2, by=H/2+148, bw=160, bh=34;
  let hovered = mouseX>bx-bw/2&&mouseX<bx+bw/2&&mouseY>by-bh/2&&mouseY<by+bh/2;
  noStroke(); fill(hovered ? color(255,140,0) : color(180,80,0));
  rect(bx, by, bw, bh, 6);
  fill(255); textSize(13); textAlign(CENTER,CENTER);
  text('↺ JUGAR DE NUEVO', bx, by);
}

// ─────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────
function drawHUD() {
  let hx=W/2, hy=H-30;

  // Panel central
  noStroke(); fill(0,0,0,170); rect(hx,hy,300,44,8);

  // Velocidad
  let spd=kart.speed, displaySpeed=floor(spd*40);
  fill(255,200,0); textSize(26); textAlign(RIGHT,CENTER);
  text(displaySpeed, hx+25, hy);
  fill(180,180,180); textSize(9); textAlign(LEFT,CENTER);
  text('km/h', hx+29, hy);

  // Laps
  fill(255); textSize(12); textAlign(LEFT,CENTER);
  text('LAP ' + min(kart.lapCount, TOTAL_LAPS) + '/' + TOTAL_LAPS, hx-145, hy);

  // Posición
  let pos = getRacePosition();
  let posStr = pos + ['ST','ND','RD','TH'][min(pos-1,3)];
  fill(255,220,0); textSize(14); textAlign(RIGHT,CENTER);
  text(posStr, hx-55, hy);

  // Tiempo de vuelta actual
  if (gameState === 'playing') {
    let curLapTime = millis() - lapStartTime;
    fill(200,200,200); textSize(10); textAlign(RIGHT,CENTER);
    text(formatTime(curLapTime), hx+145, hy+14);
    fill(120,120,120); textSize(8); textAlign(RIGHT,CENTER);
    text('VUELTA ACTUAL', hx+145, hy+4);
  }

  // Mejor vuelta (si ya hay una)
  if (bestLapTime < Infinity) {
    fill(100,255,150); textSize(8); textAlign(LEFT,CENTER);
    text('MEJOR: ' + formatTime(bestLapTime), hx-145, hy+14);
  }

  // Barra velocidad
  let barW=200;
  fill(30,30,30,180); rect(hx,hy+16,barW,8,3);
  let filled=map(spd,0,kart.maxSpeed,0,barW-4);
  fill(spd>kart.maxSpeed*0.7?color(255,80,0):color(80,200,80));
  rect(hx-barW/2+2+filled/2,hy+16,filled,6,3);

  if (!kart.onTrack) {
    fill(255,80,0,220); textSize(13); textAlign(CENTER,CENTER);
    text('⚠ FUERA DE PISTA', W/2, 28);
  }
}

// ─────────────────────────────────────────────
//  BOTÓN RESET
// ─────────────────────────────────────────────
function drawResetButton() {
  if (gameState === 'finished') return; // en finished se usa el botón de la pantalla
  let bx=W-55, by=25, bw=90, bh=28;
  let hovered=mouseX>bx-bw/2&&mouseX<bx+bw/2&&mouseY>by-bh/2&&mouseY<by+bh/2;
  noStroke(); fill(hovered?color(255,140,0):color(180,80,0));
  rect(bx,by,bw,bh,5);
  fill(255); textSize(11); textAlign(CENTER,CENTER); text('↺ RESET',bx,by);
}

function mousePressed() {
  // Botón reset normal
  let bx=W-55, by=25, bw=90, bh=28;
  if (gameState !== 'finished' &&
      mouseX>bx-bw/2&&mouseX<bx+bw/2&&mouseY>by-bh/2&&mouseY<by+bh/2) {
    resetGame(); return;
  }
  // Botón jugar de nuevo en pantalla de fin
  if (gameState === 'finished') {
    let fbx=W/2, fby=H/2+148, fbw=160, fbh=34;
    if (mouseX>fbx-fbw/2&&mouseX<fbx+fbw/2&&mouseY>fby-fbh/2&&mouseY<fby+fbh/2) {
      resetGame();
    }
  }
}

// ─────────────────────────────────────────────
//  CÁMARA
// ─────────────────────────────────────────────
function drawCameraFeed() {
  let cw=140, ch=105;
  let x = W - cw - 15;
  let y = H - ch - 55;

  push(); rectMode(CORNER);
  noStroke(); fill(0,0,0,200);
  rect(x-3, y-3, cw+6, ch+22);
  translate(x+cw, y); scale(-1,1);
  image(video, 0, 0, cw, ch);
  pop();

  push(); rectMode(CORNER);
  noFill(); stroke(255,107,0); strokeWeight(2);
  rect(x, y, cw, ch, 3);
  noStroke(); fill(255,107,0); textSize(9); textAlign(LEFT);
  text('● CAM', x+2, y+ch+14);
  pop();
}

// ─────────────────────────────────────────────
//  LABEL GESTO
// ─────────────────────────────────────────────
function drawGestureLabel() {
  if (!modelReady) return;
  let cw=140, cx=W-cw/2-10, cy=H-20;
  let col, txt;
  switch(currentLabel) {
    case 'Mizquierda': col=color(80,200,255);  txt='< IZQUIERDA'; break;
    case 'Mderecha':   col=color(255,180,0);   txt='> DERECHA';   break;
    case 'frenar':     col=color(255,60,60);   txt='! FRENAR';    break;
    default:           col=color(100,255,100); txt='— —';         break;
  }
  noStroke(); fill(0,0,0,160); rect(cx,cy,cw,18,4);
  fill(col); textSize(10); textAlign(CENTER,CENTER); text(txt,cx,cy);
  fill(30,30,30,180); rect(cx,cy+12,cw,6,3);
  let bw=map(confidence,0,1,0,cw-4);
  fill(col); rect(cx-cw/2+2+bw/2,cy+12,bw,4,3);
}

// ─────────────────────────────────────────────
//  PANTALLA DE CARGA
// ─────────────────────────────────────────────
function drawLoadingScreen() {
  background(10,10,20);
  fill(255,107,0); textSize(22); textAlign(CENTER,CENTER);
  text('Cargando modelo y camara...', W/2, H/2-20);
  fill(150); textSize(13);
  text('(puede tardar unos segundos)', W/2, H/2+20);
  fill(255,107,0);
  text('.'.repeat(floor(frameCount/20)%4), W/2, H/2+50);
}

// ─────────────────────────────────────────────
//  CUENTA REGRESIVA
// ─────────────────────────────────────────────
function drawCountdown() {
  fill(0,0,0,150); noStroke(); rect(W/2,H/2,W,H);
  let displayNum = countdownValue>0 ? str(countdownValue) : 'GO!';
  let pulse=map(sin(frameCount*0.2),-1,1,0.85,1.15);
  fill(255,200,0); textSize(120*pulse); textAlign(CENTER,CENTER);
  text(displayNum, W/2, H/2);
  fill(255); textSize(18); text('PREPARATE — ' + TOTAL_LAPS + ' VUELTAS', W/2, H/2+90);
}

// ─────────────────────────────────────────────
//  KART + RIVAL DIBUJO
// ─────────────────────────────────────────────
function drawKart() {
  push();
  translate(kart.x, kart.y); rotate(kart.angle);
  let W2=kart.width, H2=kart.height;
  noStroke(); fill(0,0,0,60); ellipse(3,5,W2+8,H2+4);
  fill(220,30,30); stroke(180,10,10); strokeWeight(1.5); rect(0,0,W2,H2,5);
  fill(180,20,20); noStroke(); rect(0,-2,W2*0.55,H2*0.65,4);
  fill(150,210,255,200); rect(2,-2,W2*0.35,H2*0.4,2);
  drawWheel(-W2*0.38,H2*0.45); drawWheel(W2*0.38,H2*0.45);
  drawWheel(-W2*0.38,-H2*0.45); drawWheel(W2*0.38,-H2*0.45);
  fill(255); noStroke(); textSize(8); textAlign(CENTER,CENTER); text('1',0,-1);
  pop();
}

function drawRival(r) {
  push();
  translate(r.x, r.y); rotate(r.angle);
  let W2=r.width, H2=r.height;
  let [cr,cg,cb]=r.col;
  noStroke(); fill(0,0,0,60); ellipse(3,5,W2+8,H2+4);
  fill(cr,cg,cb); stroke(cr*0.7,cg*0.7,cb*0.7); strokeWeight(1.5); rect(0,0,W2,H2,5);
  fill(cr*0.7,cg*0.7,cb*0.7); noStroke(); rect(0,-2,W2*0.55,H2*0.65,4);
  fill(150,210,255,180); rect(2,-2,W2*0.35,H2*0.4,2);
  drawWheel(-W2*0.38,H2*0.45); drawWheel(W2*0.38,H2*0.45);
  drawWheel(-W2*0.38,-H2*0.45); drawWheel(W2*0.38,-H2*0.45);
  fill(255); noStroke(); textSize(8); textAlign(CENTER,CENTER); text(r.num,0,-1);
  pop();
}

function drawWheel(wx, wy) {
  push(); translate(wx,wy);
  fill(30,30,30); noStroke(); rect(0,0,9,6,2);
  fill(80,80,80); ellipse(0,0,5,5);
  pop();
}

// ─────────────────────────────────────────────
//  FONDO
// ─────────────────────────────────────────────
function drawBackground() {
  for (let y=0; y<H; y++) {
    let t=y/H;
    stroke(lerp(20,10,t),lerp(30,15,t),lerp(60,20,t));
    line(0,y,W,y);
  }
  noStroke(); randomSeed(42);
  for (let i=0; i<80; i++) {
    let sx=random(W),sy=random(H*0.5),b=random(150,255),sz=random(1,2.5);
    let tw=map(sin(frameCount*0.05+i),-1,1,0.5,1);
    fill(b,b,b,b*tw); ellipse(sx,sy,sz,sz);
  }
  drawMountains();
  noStroke(); fill(40,90,40); rect(W/2,H/2,W,H);
}

function drawMountains() {
  noStroke(); fill(40,55,80);
  drawMountain(150,260,180); drawMountain(400,240,150); drawMountain(650,270,170);
  fill(30,45,60);
  drawMountain(250,280,130); drawMountain(530,275,120);
}

function drawMountain(x,baseY,size) {
  triangle(x,baseY,x-size,baseY+size*0.6,x+size,baseY+size*0.6);
  fill(200,220,255,180);
  triangle(x,baseY,x-size*0.3,baseY+size*0.2,x+size*0.3,baseY+size*0.2);
  fill(30,45,60);
}

// ─────────────────────────────────────────────
//  PISTA
// ─────────────────────────────────────────────
function drawTrack() {
  noFill();
  stroke(0,0,0,80); strokeWeight(TRACK_WIDTH+20); drawTrackFromPoints();
  stroke(55,55,60); strokeWeight(TRACK_WIDTH);    drawTrackFromPoints();
  stroke(255,220,0,180); strokeWeight(2);
  for (let i=0; i<TRACK_PTS.length; i+=2) {
    let a=TRACK_PTS[i], b=TRACK_PTS[(i+1)%TRACK_PTS.length];
    line(a.x,a.y,b.x,b.y);
  }
  drawInnerGrass();
}

function drawTrackFromPoints() {
  beginShape(); noFill();
  for (let pt of TRACK_PTS) vertex(pt.x,pt.y);
  endShape(CLOSE);
}

function drawInnerGrass() {
  noStroke(); fill(40,100,40); ellipse(400,335,420,310);
  fill(50,115,50); randomSeed(99);
  for (let i=0; i<50; i++)
    ellipse(random(200,600),random(185,480),random(3,7),random(3,7));
}

function drawFinishLine() {
  let s=TRACK_PTS[0], size=TRACK_WIDTH/2;
  let cols=6, cellW=(size*2)/cols, cellH=10, rows=3;
  push(); translate(s.x,s.y);
  for (let r=0; r<rows; r++)
    for (let c=0; c<cols; c++) {
      noStroke(); fill((r+c)%2===0?255:0);
      rect(-size+c*cellW+cellW/2,-rows*cellH/2+r*cellH+cellH/2,cellW,cellH);
    }
  pop();
}

// ─────────────────────────────────────────────
//  PARTÍCULAS
// ─────────────────────────────────────────────
function spawnParticle(x,y,angle) {
  let a=angle+PI+random(-0.4,0.4), spd=random(0.5,2);
  let col=kart.onTrack?color(180,180,180,180):color(100,180,80,200);
  particles.push({x,y,vx:cos(a)*spd,vy:sin(a)*spd,life:1.0,size:random(4,10),col});
}

function updateAndDrawParticles() {
  for (let i=particles.length-1; i>=0; i--) {
    let pt=particles[i];
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vx*=0.95; pt.vy*=0.95;
    pt.life-=0.03; pt.size*=0.97;
    if (pt.life<=0) { particles.splice(i,1); continue; }
    noStroke();
    fill(red(pt.col),green(pt.col),blue(pt.col),alpha(pt.col)*pt.life);
    ellipse(pt.x,pt.y,pt.size,pt.size);
  }
}

// ─────────────────────────────────────────────
//  UTILIDADES PISTA
// ─────────────────────────────────────────────
function buildTrackPoints(count) {
  let pts=[], n=TRACK_CTRL.length;
  for (let i=0; i<count; i++) {
    let t=i/count, st=t*n, idx=Math.floor(st), f=st-idx;
    let p0=TRACK_CTRL[(idx-1+n)%n], p1=TRACK_CTRL[idx%n];
    let p2=TRACK_CTRL[(idx+1)%n],   p3=TRACK_CTRL[(idx+2)%n];
    pts.push({x:catmullRom(p0.x,p1.x,p2.x,p3.x,f), y:catmullRom(p0.y,p1.y,p2.y,p3.y,f)});
  }
  return pts;
}

function catmullRom(p0,p1,p2,p3,t) {
  return 0.5*((2*p1)+(-p0+p2)*t+(2*p0-5*p1+4*p2-p3)*t*t+(-p0+3*p1-3*p2+p3)*t*t*t);
}

function isOnTrack(x,y) {
  let minDist=Infinity;
  for (let pt of TRACK_PTS) {
    let d=dist(x,y,pt.x,pt.y);
    if (d<minDist) minDist=d;
  }
  return minDist < TRACK_WIDTH/2;
}

function closestTrackIndex(x,y) {
  let minDist=Infinity, idx=0;
  for (let i=0; i<TRACK_PTS.length; i++) {
    let d=dist(x,y,TRACK_PTS[i].x,TRACK_PTS[i].y);
    if (d<minDist) { minDist=d; idx=i; }
  }
  return idx;
}
